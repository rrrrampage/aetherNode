                    <p>Любой 3D-движок под капотом оперирует не визуальными полигонами, а массивами линейной алгебры. Позиция, вращение и масштаб объекта выражаются через аффинные преобразования векторов при помощи умножения на квадратную матрицу трансформации размером $4 \\times 4$.</p>
                    <p>Матрица преобразования $M$ вычисляется как произведение матриц масштабирования $S$, вращения $R$ и перемещения $T$:</p>
                    <p>$$M = T \\cdot R \\cdot S$$</p>
                    <p>В Blender 4.x ручные вычисления скрыты за абстракцией Python-модуля <code>mathutils</code>. Давайте напишем скрипт, генерирующий процедурную шахматную пешку с математически точным сдвигом векторов вершин.</p>
                    <h3>Скрипт генерации структуры геометрии:</h3>
                    <pre>
import bpy
import math
from mathutils import Vector, Matrix

def generate_math_pawn():
    # Удаляем куб по дефолту
    if "Cube" in bpy.data.objects:
        bpy.data.objects.remove(bpy.data.objects["Cube"], do_unlink=True)
        
    # Инициализируем массив координат вершин
    vertices = []
    segments = 16
    
    # Математический расчет формы пешки по функции синуса
    for i in range(segments):
        z = (i / segments) * 2.0  # Высота объекта от 0 до 2 метров
        # Радиус зависит от высоты (строим профиль вращения)
        radius = 0.6 * math.exp(-z) + 0.2 * math.sin(z * 4) + 0.15
        
        for s in range(segments):
            angle = (s / segments) * 2 * math.pi
            x = math.cos(angle) * radius
            y = math.sin(angle) * radius
            vertices.append((x, y, z))
            
    # Создаем полигональную сетку (Mesh) в базе Blender
    mesh = bpy.data.meshes.new(name="Pawn_Mesh")
    obj = bpy.data.objects.new("Math_Pawn", mesh)
    bpy.context.collection.objects.link(obj)
    
    # Строим вершины из списка координат
    mesh.from_pydata(vertices, [], [])
    mesh.update()
    
    # Применяем матрицу масштабирования программно
    scale_matrix = Matrix.Scale(1.2, 4, Vector((0, 0, 1)))
    obj.matrix_world = obj.matrix_world @ scale_matrix

generate_math_pawn()
print("Математическая модель сгенерирована!")</pre>

                    <p>Реалистичное стекло в компьютерной графике подчиняется законам геометрической оптики Снеллиуса и формулам Френеля. Коэффициент отражения света $R$ зависит от угла падения луча к нормали поверхности $\\theta$ и показателя преломления среды $IOR$:</p>
                    <p>$$R(\\theta) = R_0 + (1 - R_0)(1 - \\cos\\theta)^5$$</p>
                    <p>Для стандартного силикатного стекла $IOR \\approx 1.45$. Нам необходимо создать материал стекла, который динамически смешивает прозрачность и зеркальное отражение, не используя растровые текстурные карты (полный процедурный цикл).</p>
                    <h3>Скрипт автоматической сборки шейдерного дерева:</h3>
                    <pre>
import bpy

def build_glass_shader():
    mat = bpy.data.materials.new(name="Advanced_Fresnel_Glass")
    mat.use_nodes = True
    nodes = mat.node_tree.nodes
    links = mat.node_tree.links
    nodes.clear()
    
    # Создаем ноды структуры
    pbr = nodes.new(type="ShaderNodeBsdfPrincipled")
    pbr.location = (0, 0)
    pbr.inputs['Roughness'].default_value = 0.01
    pbr.inputs['IOR'].default_value = 1.450
    pbr.inputs['Transmission'].default_value = 1.0  # Пропускание света
    
    # Шум для имитации пыли на стекле
    noise = nodes.new(type="ShaderNodeTexNoise")
    noise.location = (-300, 100)
    noise.inputs['Scale'].default_value = 250.0
    
    math_node = nodes.new(type="ShaderNodeMath")
    math_node.operation = 'MULTIPLY'
    math_node.inputs[1].default_value = 0.05
    math_node.location = (-100, 100)
    
    output = nodes.new(type="ShaderNodeOutputMaterial")
    output.location = (250, 0)
    
    # Линкуем микро-шероховатость
    links.new(noise.outputs['Factor'], math_node.inputs[0])
    links.new(math_node.outputs['Value'], pbr.inputs['Roughness'])
    links.new(pbr.outputs['BSDF'], output.inputs['Surface'])

build_glass_shader()</pre>

                    <h3>Скрипт генерации маски на основе нормалей:</h3>

import bpy
import numpy as np

def generate_sculpt_mask():
    obj = bpy.context.active_object
    if not obj or obj.type != 'MESH':
        print("Выберите полигональный объект!")
        return
        
    mesh = obj.data
    num_vertices = len(mesh.vertices)
    
    # Инициализируем массив маски
    mask_values = np.zeros(num_vertices, dtype=np.float32)
    
    # Пробегаемся по полигонам и считаем кривизну
    for poly in mesh.polygons:
        for v_id in poly.vertices:
            # Оцениваем отклонение нормали полигона от оси Z
            angle_dev = poly.normal.dot((0, 0, 1))
            if angle_dev < 0.7:
                mask_values[v_id] = 1.0  # Маскируем крутые склоны геометрии

    # Записываем маску в кастомные атрибуты вершины для скульптинга
    if not mesh.attributes.get("SculptMask"):
        mesh.attributes.new(name="SculptMask", type='FLOAT', domain='POINT')
    mesh.attributes["SculptMask"].data.foreach_set("value", mask_values)
    print("Маска оптимизации скульптинга рассчитана и загружена в буфер!")

                    <p>Классический трехточечный свет включает три источника: Ключевой (Key), Заполняющий (Fill) и Контурный (Rim). Их координаты $x$ и $y$ рассчитываются по закону тригонометрического круга с радиусом $R$:</p>

                    <h3>Автоматический скрипт построения студийной фотозоны:</h3>
                    <pre>
import bpy
import math

def setup_studio_lighting(radius=5.0, target_loc=(0,0,1)):
    # Удаляем старые лампы
    bpy.ops.object.select_all(action='DESELECT')
    for obj in bpy.data.objects:
        if obj.type == 'LIGHT':
            bpy.data.objects.remove(obj, do_unlink=True)
            
    lights_data = [
        {"name": "Key_Light", "type": "AREA", "angle": 45, "energy": 500, "color": (1, 0.85, 0.7)},
        {"name": "Fill_Light", "type": "AREA", "angle": 135, "energy": 150, "color": (0.7, 0.85, 1)},
        {"name": "Rim_Light", "type": "SPOT", "angle": -90, "energy": 800, "color": (0, 0.95, 1)}
    ]
    
    for l in lights_data:
        rad = math.radians(l["angle"])
        x = radius * math.cos(rad)
        y = radius * math.sin(rad)
        
        # Спавним источник света
        light_data = bpy.data.lights.new(name=l["name"], type=l["type"])
        light_obj = bpy.data.objects.new(name=l["name"], object_data=light_data)
        bpy.context.collection.objects.link(light_obj)
        
        light_obj.location = (x, y, 3.0)
        light_data.energy = l["energy"]
        light_data.color = l["color"]
        
        # Направляем источник на объект через констрейнт Track To
        track = light_obj.constraints.new(type='TRACK_TO')
        track.target = bpy.context.active_object if bpy.context.active_object else None
        track.track_axis = 'TRACK_NEGATIVE_Z'
        track.up_axis = 'UP_Y'

setup_studio_lighting()
print("Киберпанк фотозона развернута по тригонометрической сетке!")</pre>

                content: `
                    <p>Процедурная генерация на базовом уровне управляется нодами, но ручное соединение сотен связей превращается в "спагетти". В этом руководстве мы напишем скрипт на <strong>Python (bpy)</strong>, который автоматически генерирует дерево Geometry Nodes для процедурного многоэтажного здания.</p>
                    <p>Математическая суть проста: мы берем вертикальную ось $Z$ и генерируем массив точек с шагом, равным высоте этажа $H_{floor}$, используя формулу распределения:</p>
                    <p>$$Z_i = i \\cdot H_{floor}$$</p>
                    <h3>Полный листинг скрипта автоматизации:</h3>
                    <pre>
import bpy

def create_procedural_building_nodes():
    bpy.ops.mesh.primitive_cube_add(size=2, enter_editmode=False, location=(0, 0, 0))
    obj = bpy.context.active_object
    obj.name = "Procedural_Building"
    
    modifier = obj.modifiers.new(name="GenNodes", type='NODES')
    node_group = bpy.data.node_groups.new(name="BuildingGenerator", type='GeometryNodeTree')
    modifier.node_group = node_group
    node_group.nodes.clear()
    
    group_in = node_group.nodes.new(type="NodeGroupInput")
    group_in.location = (-400, 0)
    group_out = node_group.nodes.new(type="NodeGroupOutput")
    group_out.location = (400, 0)
    
    node_group.interface.new_socket(name="Geometry", in_out='OUTPUT', socket_type='NodeSocketGeometry')
    node_group.interface.new_socket(name="Base Mesh", in_out='INPUT', socket_type='NodeSocketGeometry')
    
    mesh_line = node_group.nodes.new(type="GeometryNodeMeshLine")
    mesh_line.location = (-150, 100)
    mesh_line.inputs['Count'].default_value = 5  
    mesh_line.inputs['Offset'].default_value[2] = 2.5  
    
    instance_nodes = node_group.nodes.new(type="GeometryNodeInstanceOnPoints")
    instance_nodes.location = (150, 0)
    
    window_mesh = node_group.nodes.new(type="GeometryNodeMeshCube")
    window_mesh.location = (-150, -150)
    window_mesh.inputs['Size'].default_value = (1.2, 0.2, 1.5)
    
    links = node_group.links
    links.new(mesh_line.outputs['Mesh'], instance_nodes.inputs['Points'])
    links.new(window_mesh.outputs['Mesh'], instance_nodes.inputs['Instance'])
    links.new(instance_nodes.outputs['Instances'], group_out.inputs['Geometry'])

create_procedural_building_nodes()</pre>

                content: "<p>При импорте сложных моделей из Blender в Unreal Engine 5.5 разработчики часто сталкиваются с появлением жестких швов на гладких поверхностях. Проблема кроется в несовпадении алгоритмов вычисления тангенциального пространства. Оптимальный пайплайн для студий требует экспорта в формате USD (Universal Scene Description) вместо FBX или принудительного включения флага 'MikkTSpace' в настройках триангуляции геометрии перед экспортом.</p>" 
            },
            "4": { 
                isLesson: false, tag: "Оптимизация памяти", date: "10 Мая 2026", 
                title: "Тренды 2026 года: Экономия видеопамяти (VRAM) на рендер-фермах через процедурные 3D-шумы", 
                content: "<p>С ростом детализации сцен в 8К-разрешении текстурные карты начинают перегружать память видеокарт, приводя к Out of Memory ошибкам на рендер-фермах. Современный подход 2026 года базируется на отказе от растровых карт поверхностей в пользу математических 3D-текстур. Алгоритмы шумов Вороного, Перлина и Перлина-Симплекс генерируются на лету графическим чипом. Это позволяет упаковать детализацию гигантского города всего в несколько килобайт шейдерного кода.</p>" 
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');
        const post = articlesDatabase[postId];

        if (post) {
            document.title = `${post.title} | AetherNode`;
            document.getElementById('post-content-target').innerHTML = `
                <div class="post-meta-top"><span class="post-tag">${post.tag}</span><span>•</span><span>${post.date}</span></div>
                <h1 class="post-title">${post.title}</h1>
                <div class="post-content">${post.content}</div>
            `;
            if (post.isLesson) {
                document.getElementById('reward-zone').style.display = 'block';
                checkLessonStatus();
            }
        }

        function checkLessonStatus() {
            const user = localStorage.getItem('aether_user');
            const btn = document.getElementById('claim-xp-btn');
            const desc = document.getElementById('reward-desc');
            
            if (!user) {
                btn.disabled = true;
                desc.innerHTML = `<span style="color: var(--primary);">Внимание:</span> Чтобы зафиксировать <strong>${post.xp} XP</strong>, <a href="blog.html" style="color:var(--accent); text-decoration:underline;">инициализируйте профиль</a> на главной странице блога.`;
                return;
            }

            const completed = JSON.parse(localStorage.getItem('aether_completed_lessons') || '[]');
            if (completed.includes(postId)) {
                btn.disabled = true;
                btn.innerText = 'Лабораторная сдана';
                btn.style.background = 'transparent'; btn.style.borderColor = 'var(--success)'; btn.style.color = 'var(--success)';
                desc.innerText = `Вы успешно защитили лабораторную работу и забрали ${post.xp} XP.`;
            } else {
                desc.innerText = `Вы получите +${post.xp} XP в ваш личный профиль инженера.`;
            }
        }

        function completeLesson() {
            const user = localStorage.getItem('aether_user'); if(!user) return;
            const completed = JSON.parse(localStorage.getItem('aether_completed_lessons') || '[]');
            if (!completed.includes(postId)) {
                completed.push(postId);
                localStorage.setItem('aether_completed_lessons', JSON.stringify(completed));
                checkLessonStatus();
            }
        }

        // Исправленный скрипт кастомного курсора для post.html
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        if (!isTouchDevice) {
            const dot = document.querySelector('.cursor-dot');
            const outline = document.querySelector('.cursor-outline');
            let mx = 0, my = 0, ox = 0, oy = 0;

            window.addEventListener('mousemove', (e) => {
                mx = e.clientX; my = e.clientY;
                dot.style.opacity = '1'; outline.style.opacity = '1';
                dot.style.left = `${mx}px`; dot.style.top = `${my}px`;
            });

            const animCursor = () => {
                ox += (mx - ox) * 0.12; oy += (my - oy) * 0.12;
                outline.style.left = `${ox}px`; outline.style.top = `${oy}px`;
                requestAnimationFrame(animCursor);
            };
            animCursor();

            document.body.addEventListener('mouseover', (e) => { if (e.target.closest('.hover-target')) document.body.classList.add('hovering'); });
            document.body.addEventListener('mouseout', (e) => { if (e.target.closest('.hover-target')) document.body.classList.remove('hovering'); });
        } else {
            document.querySelector('.cursor-dot')?.remove(); document.querySelector('.cursor-outline')?.remove();
        }

    document.addEventListener('DOMContentLoaded', () => {
        const isLogged = localStorage.getItem('isLoggedIn') === 'true';
        const authZone = document.getElementById('auth-zone');

        if (isLogged && authZone) {
            // Если пользователь залогинен, меняем кнопку "Регистрация" на "Личный кабинет"
            authZone.innerHTML = `<a href="profile.html" class="btn" style="background: transparent; border: 1px solid var(--accent); color: var(--accent);">Личный кабинет</a>`;
        }
    });
    </script>
